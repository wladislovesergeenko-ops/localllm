services:
  hermes:
    build:
      context: ./hermes-agent
    container_name: hermes
    restart: unless-stopped
    volumes:
      # Данные агента — только этот volume, хостовая ФС НЕ монтируется
      - hermes-data:/opt/data
      # Наш конфиг поверх дефолтного
      - ./config.yaml:/opt/data/config.yaml
      - ./.env:/opt/data/.env
    extra_hosts:
      # Чтобы контейнер видел LM Studio на Windows-хосте
      - "host.docker.internal:host-gateway"
    environment:
      - HERMES_UID=1000
    command: gateway run
    # Порт нужен только если хочешь web-интерфейс
    # ports:
    #   - "7860:7860"

volumes:
  hermes-data:
    # Изолированный volume — агент не видит файлы хоста
