model:
  provider: "openrouter"
  default: "google/gemini-2.0-flash-001"

display:
  tool_progress: "off"

terminal:
  backend: "local"
  cwd: "/opt/data/workspace"

tts:
  provider: "edge"
  edge:
    voice: "ru-RU-SvetlanaNeural"
    speed: 1.5

gateway:
  # Telegram настраивается через .env
  platforms:
    - telegram
