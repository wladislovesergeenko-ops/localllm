model:
  provider: "lmstudio"
  base_url: "http://host.docker.internal:1234/v1"
  default: "google/gemma-3-4b"

  # Для сложных задач с reasoning — переключать вручную:
  # hermes model → выбрать google/gemma-4-e4b (помни: max_tokens должен быть большим)

  # Лимиты под железо (RTX 3050 8GB, context выставлен в LM Studio)
  context_length: 8192
  # max_tokens оставляем unset — модель сама знает свой потолок
  # Исключение: для gemma-4-e4b нужно явно 1500+

terminal:
  backend: "local"
  cwd: "/opt/data/workspace"

gateway:
  # Telegram настраивается через .env
  platforms:
    - telegram
